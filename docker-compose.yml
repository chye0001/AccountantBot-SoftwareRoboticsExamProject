services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-accountant-bot
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      - n8n_accountantbot_data:/home/node/.n8n
      - ./workflows:/workflows
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: expense-mongo
    restart: unless-stopped
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo_accountantbot_data:/data/db

  discord-bot:
    image: node:20-alpine
    container_name: expense-discord-bot
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./discord-bot:/app
    command: sh -c "npm install && npm start"
    depends_on:
      - n8n

volumes:
  n8n_accountantbot_data:
  mongo_accountantbot_data: